<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Bazar</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f6fa;
    }

    /* HEADER */
    header {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 15px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .btn {
      background: black;
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      text-decoration: none;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 10px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .chip {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
    }

    .chip.active {
      background: black;
      color: white;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* CARD */
    .card {
      background: white;
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .card-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .badge {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #eee;
    }

    .desc {
      font-size: 13px;
      color: #555;
      margin: 10px 0;
    }

    .meta {
      font-size: 11px;
      color: gray;
      display: flex;
      justify-content: space-between;
    }

    /* FORM */
    .form {
      max-width: 500px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #eee;
    }

    input, textarea, select {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<header>
  <div class="container header-inner">
    <div class="logo">🎓 College Bazar</div>
    <a class="btn" href="#">+ Create</a>
  </div>
</header>

<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <div class="chip active">All</div>
    <div class="chip">Books</div>
    <div class="chip">Clothes</div>
    <div class="chip">Electronics</div>
    <div class="chip">Other</div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <div class="card">
      <div class="card-title">Math Book</div>
      <span class="badge">Books</span>
      <div class="desc">Used math textbook for 2nd year students</div>
      <div class="meta">
        <span>+996 xxx</span>
        <span>2h ago</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">iPhone 11</div>
      <span class="badge">Electronics</span>
      <div class="desc">Good condition, battery 85%</div>
      <div class="meta">
        <span>Telegram</span>
        <span>1 day ago</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Jacket</div>
      <span class="badge">Clothes</span>
      <div class="desc">Winter jacket size M</div>
      <div class="meta">
        <span>WhatsApp</span>
        <span>3 days ago</span>
      </div>
    </div>

  </div>

</div>

</body>
</html>
